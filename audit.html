<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hormuz AI - Free AI Visibility Audit</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 20px auto;
      padding: 20px;
      line-height: 1.6;
      background: #0a0a0a;
      color: #fff;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    input, button {
      font-size: 16px;
      padding: 14px;
      width: 100%;
      margin: 12px 0;
      border-radius: 8px;
      border: none;
    }
    input { background: #1f1f1f; color: #fff; }
    button {
      background: #00ff00;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 20px;
      background: #111;
      border-radius: 8px;
      border: 1px solid #222;
    }
    .fix-btn {
      background: #00ff00;
      color: #000;
      padding: 14px 24px;
      border-radius: 8px;
      display: inline-block;
      margin-top: 15px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }
    ul { padding-left: 20px; }
    li { margin: 8px 0; }
    a { color: #00ff00; }
  </style>
</head>
<body>
  <h1>Free AI Visibility Audit</h1>
  <p>Paste your Shopify store URL</p>
  <input id="url" type="text" placeholder="https://yourstore.myshopify.com" value="">
  <button onclick="runAudit()">Run Audit • 30 seconds</button>
  
  <div id="result"></div>

  <script>
    const CORS_PROXY = "https://corsproxy.io/?";

    async function runAudit() {
      let url = document.getElementById('url').value.trim();
      if (!url) return alert("Please paste your Shopify store URL");
      if (!url.startsWith("http")) url = "https://" + url;
      if (url.endsWith("/")) url = url.slice(0, -1);

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = "<p>Scanning your store...</p>";

      try {
        const robotsRes = await fetch(CORS_PROXY + encodeURIComponent(url + "/robots.txt"));
        const robotsText = await robotsRes.text();
        const robotsOK = robotsRes.ok && robotsText.length > 10;

        const productsRes = await fetch(CORS_PROXY + encodeURIComponent(url + "/products.json?limit=1"));
        const productsOK = productsRes.ok;

        const homeRes = await fetch(CORS_PROXY + encodeURIComponent(url));
        const html = await homeRes.text();
        const jsonldOK = html.includes('application/ld+json') && html.includes('"@type":"Product"');

        let score = 0;
        if (robotsOK) score += 30;
        if (productsOK) score += 40;
        if (jsonldOK) score += 30;

        let report = `<h2>Audit Result • Score ${score}/100</h2>`;

        if (score >= 70) {
          report += `<p style="color:#00ff00">Almost AI-ready. Small fixes needed.</p>`;
        } else {
          report += `<p style="color:#ff0000">Your store is currently invisible to ChatGPT, Claude & Perplexity.</p>`;
        }

        report += `<ul>
          <li>robots.txt: ${robotsOK ? "✅ Good" : "❌ Missing or blocking AI crawlers"}</li>
          <li>Product feed: ${productsOK ? "✅ Public" : "❌ Not public"}</li>
          <li>JSON-LD structured data: ${jsonldOK ? "✅ Present" : "❌ Missing"}</li>
        </ul>`;

        report += `<h3>Fix files (download now):</h3>
          <a href="data:text/plain;charset=utf-8,User-agent:%20*%0ADisallow:%20%0A%0ASitemap:%20${url}/sitemap_products_1.xml" download="robots.txt">Download fixed robots.txt</a><br><br>`;

        report += `<p><strong>Next step (takes 2 minutes):</strong><br>
        1. Download and upload the robots.txt file above to your Shopify theme.<br>
        2. Tap the button below to send me your exact audit on WhatsApp.<br>
        I will reply immediately with clear step-by-step fix instructions.</p>`;

        // Clean WhatsApp message - FIXED
        const waMessage = `Hi Hormuz AI,\n\nI ran the free audit.\nStore: ${url}\nScore: ${score}/100\n\nIssues:\n• robots.txt: ${robotsOK ? 'Good' : 'Bad'}\n• Product feed: ${productsOK ? 'Good' : 'Bad'}\n• JSON-LD: ${jsonldOK ? 'Good' : 'Bad'}\n\nPlease send me the fix instructions.`;

        const waLink = `https://wa.me/27731945176?text=${encodeURIComponent(waMessage)}`;

        report += `<a href="${waLink}" class="fix-btn">Send my audit to WhatsApp for full fix guide</a>`;

        resultDiv.innerHTML = report;
      } catch(e) {
        resultDiv.innerHTML = `<p style="color:#ff0000">Could not reach the store. Please send the URL on WhatsApp for manual audit.</p>`;
      }
    }
  </script>
</body>
</html>
