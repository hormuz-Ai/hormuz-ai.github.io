<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hormuz AI Audit - Free</title>
  <style>body{font-family: system-ui; max-width: 640px; margin: 20px auto; padding: 20px; line-height: 1.5;}</style>
</head>
<body>
  <h1>Free AI Visibility Audit</h1>
  <p>Paste your Shopify store URL (e.g. mystore.myshopify.com)</p>
  <input id="url" type="text" placeholder="https://yourstore.myshopify.com" style="width:100%; padding:12px; font-size:16px;">
  <button onclick="runAudit()" style="margin-top:10px; padding:12px 24px; font-size:16px;">Run Audit (30 seconds)</button>
  <div id="result" style="margin-top:20px;"></div>

  <script>
    async function runAudit() {
      const input = document.getElementById('url').value.trim();
      if (!input) return alert('Paste URL');
      const url = input.endsWith('/') ? input.slice(0,-1) : input;
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p>Scanning...</p>';

      try {
        // robots.txt
        const robotsRes = await fetch(url + '/robots.txt');
        const robotsOK = robotsRes.ok && (await robotsRes.text()).includes('User-agent');

        // products.json (public on most stores)
        const prodRes = await fetch(url + '/products.json?limit=1');
        const productsOK = prodRes.ok;

        // homepage for JSON-LD
        const homeRes = await fetch(url);
        const html = await homeRes.text();
        const hasJSONLD = html.includes('application/ld+json') && html.includes('"@type":"Product"');

        let score = 0;
        if (robotsOK) score += 30;
        if (productsOK) score += 40;
        if (hasJSONLD) score += 30;

        let report = `<h2>Audit Result</h2><p><strong>Score: ${score}/100</strong></p>`;
        if (score < 70) report += `<p style="color:red">Your store is mostly invisible to AI.</p>`;
        else report += `<p style="color:green">Almost AI-ready.</p>`;

        report += `<ul>
          <li>robots.txt: ${robotsOK ? '✅ Good' : '❌ Missing or blocking AI'}</li>
          <li>Product feed: ${productsOK ? '✅ Public' : '❌ Not public'}</li>
          <li>JSON-LD structured data: ${hasJSONLD ? '✅ Present' : '❌ Missing'}</li>
        </ul>`;

        report += `<h3>Fix files (download & upload):</h3>
          <a href="data:text/plain;charset=utf-8,User-agent:%20*%0ADisallow:%20%0A%0ASitemap:%20${url}/sitemap_products_1.xml" download="robots.txt">Download fixed robots.txt</a><br><br>
          <p>Upload to your Shopify theme + add metafields (instructions below).</p>`;

        resultDiv.innerHTML = report + `<p><strong>Next step:</strong> Apply fixes → reply on WhatsApp with your URL when live → pay R999 only after verified.</p>`;
      } catch(e) {
        resultDiv.innerHTML = `<p style="color:red">Could not scan (store might block or private). Send me the URL on WhatsApp for manual check.</p>`;
      }
    }
  </script>
</body>
</html>
